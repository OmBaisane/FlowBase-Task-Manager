<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FlowBase — Real-Time Task Management</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="FlowBase - Modern real-time task management for teams" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  </head>
  <body>
    <app-root></app-root>
    <script>
      // Apply saved theme before Angular boots to avoid flash
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </body>
</html>
