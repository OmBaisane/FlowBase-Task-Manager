<header
  class="h-16 flex items-center justify-between px-5 sticky top-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-200/70 dark:border-slate-700/40 shadow-sm"
>
  <div class="flex items-center gap-3">
    <button
      (click)="onMenuClick()"
      class="lg:hidden w-9 h-9 flex items-center justify-center rounded-xl transition-all bg-slate-100 dark:bg-slate-800 border border-slate-200/80 dark:border-slate-700/40 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-400"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>

    <div class="relative w-9 h-9 flex shrink-0">
      <div
        class="w-9 h-9 rounded-xl bg-linear-to-br from-blue-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/30"
      >
        <svg class="w-5 h-5 text-white drop-shadow" viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"
            clip-rule="evenodd"
          />
        </svg>
      </div>
      <span
        class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-emerald-500 ring-2 ring-white dark:ring-slate-900 flex items-center justify-center"
      >
        <span
          class="absolute inline-flex w-full h-full rounded-full bg-emerald-400 animate-ping opacity-60"
        ></span>
      </span>
    </div>

    <div class="leading-tight">
      <div class="flex items-center gap-1.5">
        <span class="text-base font-extrabold tracking-tight text-slate-900 dark:text-white"
          >Flow</span
        >
        <span class="text-base font-extrabold tracking-tight text-blue-600">Base</span>
      </div>
      <p
        class="text-[10px] font-medium text-slate-400 dark:text-slate-500 hidden sm:block leading-none"
      >
        Real-time Task Management
      </p>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button
      (click)="toggleDark()"
      class="w-9 h-9 rounded-xl flex items-center justify-center transition-all bg-slate-100 dark:bg-slate-800 border border-slate-200/80 dark:border-slate-700/40 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400"
    >
      <svg *ngIf="!isDark" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
        />
      </svg>
      <svg
        *ngIf="isDark"
        class="w-4 h-4 text-amber-400"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
        />
      </svg>
    </button>

    <div class="flex items-center gap-2.5 pl-1">
      <div
        class="w-8 h-8 rounded-full flex items-center justify-center bg-linear-to-br from-blue-500 to-indigo-600 text-white text-xs font-bold shadow-md shadow-blue-500/20 select-none shrink-0"
      >
        {{ initials }}
      </div>
      <div class="hidden sm:block">
        <p class="text-sm font-semibold text-slate-800 dark:text-white leading-tight">
          {{ user?.name }}
        </p>
        <p class="text-[10px] text-slate-400 dark:text-slate-500 capitalize font-medium">
          {{ user?.role }}
        </p>
      </div>
    </div>

    <button
      (click)="logout()"
      class="flex items-center gap-1.5 px-3 py-2 ml-1 rounded-xl text-xs font-semibold transition-all text-slate-500 dark:text-slate-400 hover:text-red-500 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 border border-transparent hover:border-red-100 dark:hover:border-red-500/20"
    >
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
        />
      </svg>
      <span class="hidden sm:inline">Logout</span>
    </button>
  </div>
</header>
