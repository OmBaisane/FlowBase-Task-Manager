<div class="bg-white dark:bg-slate-800/70 rounded-2xl
            border border-slate-200/60 dark:border-slate-700/40 shadow-sm p-6">

  <!-- Card header -->
  <div class="flex items-center gap-2.5 mb-5">
    <div class="w-7 h-7 rounded-xl bg-blue-50 dark:bg-blue-500/10
                flex items-center justify-center flex-shrink-0">
      <svg class="w-3.5 h-3.5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
      </svg>
    </div>
    <h3 class="text-sm font-bold text-slate-800 dark:text-white">New Task</h3>
  </div>

  <!-- Error / Success -->
  <div *ngIf="error"
    class="mb-4 flex items-start gap-2 p-3 rounded-xl text-xs font-medium
           bg-red-50 dark:bg-red-500/10 border border-red-100 dark:border-red-500/20
           text-red-600 dark:text-red-400">
    <svg class="w-3.5 h-3.5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    {{ error }}
  </div>
  <div *ngIf="success"
    class="mb-4 flex items-start gap-2 p-3 rounded-xl text-xs font-medium
           bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-100 dark:border-emerald-500/20
           text-emerald-600 dark:text-emerald-400">
    <svg class="w-3.5 h-3.5 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
    {{ success }}
  </div>

  <div class="space-y-3.5">
    <!-- Title -->
    <div>
      <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5">
        Title <span class="text-red-400 normal-case">*</span>
      </label>
      <input type="text" [(ngModel)]="title" name="title"
        placeholder="What needs to be done?"
        class="w-full px-3.5 py-2.5 text-sm rounded-xl transition-all
               bg-slate-50 dark:bg-slate-700/50
               border border-slate-200 dark:border-slate-600/40
               text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500
               focus:outline-none focus:ring-2 focus:ring-blue-500/25 focus:border-blue-400/50" />
    </div>

    <!-- Description -->
    <div>
      <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5">
        Description
      </label>
      <textarea [(ngModel)]="description" name="description" rows="3"
        placeholder="Add more context..."
        class="w-full px-3.5 py-2.5 text-sm rounded-xl transition-all resize-none
               bg-slate-50 dark:bg-slate-700/50
               border border-slate-200 dark:border-slate-600/40
               text-slate-800 dark:text-white placeholder-slate-400 dark:placeholder-slate-500
               focus:outline-none focus:ring-2 focus:ring-blue-500/25 focus:border-blue-400/50">
      </textarea>
    </div>

    <!-- Priority + Due Date -->
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5">
          Priority
        </label>
        <select [(ngModel)]="priority" name="priority"
          class="w-full px-3.5 py-2.5 text-sm rounded-xl transition-all cursor-pointer
                 bg-slate-50 dark:bg-slate-700/50
                 border border-slate-200 dark:border-slate-600/40
                 text-slate-800 dark:text-white
                 focus:outline-none focus:ring-2 focus:ring-blue-500/25">
          <option value="low">🟢 Low</option>
          <option value="medium">🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
      </div>

      <div>
        <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5">
          Due Date
        </label>
        <input type="date" [(ngModel)]="dueDate" name="dueDate"
          class="w-full px-3.5 py-2.5 text-sm rounded-xl transition-all cursor-pointer
                 bg-slate-50 dark:bg-slate-700/50
                 border border-slate-200 dark:border-slate-600/40
                 text-slate-800 dark:text-white
                 focus:outline-none focus:ring-2 focus:ring-blue-500/25" />
      </div>
    </div>

    <!-- Assign To (admin only) -->
    <div *ngIf="isAdmin">
      <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1.5">
        Assign To
      </label>
      <select [(ngModel)]="assignedTo" name="assignedTo"
        class="w-full px-3.5 py-2.5 text-sm rounded-xl transition-all cursor-pointer
               bg-slate-50 dark:bg-slate-700/50
               border border-slate-200 dark:border-slate-600/40
               text-slate-800 dark:text-white
               focus:outline-none focus:ring-2 focus:ring-blue-500/25">
        <option value="">— Unassigned</option>
        <option *ngFor="let u of users" [value]="u._id">{{ u.name }}</option>
      </select>
    </div>

    <!-- Submit -->
    <button (click)="createTask()" [disabled]="loading"
      class="w-full py-2.5 text-sm font-bold rounded-xl transition-all duration-150
             bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white
             shadow-md shadow-blue-500/25 hover:shadow-lg hover:shadow-blue-500/30
             disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none
             flex items-center justify-center gap-2">
      <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      {{ loading ? 'Creating...' : '+ Create Task' }}
    </button>
  </div>

</div>
