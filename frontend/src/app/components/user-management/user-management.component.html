<div
  class="bg-white dark:bg-slate-800/70 rounded-2xl border border-slate-200/60 dark:border-slate-700/40 shadow-sm overflow-hidden mt-6 mb-6"
>
  <div class="px-5 py-4 border-b border-slate-100 dark:border-slate-700/30">
    <h3 class="text-sm font-bold text-slate-800 dark:text-white tracking-tight">Team Members</h3>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left text-sm text-slate-500 dark:text-slate-400">
      <thead
        class="text-xs text-slate-700 uppercase bg-slate-50 dark:bg-slate-700/50 dark:text-slate-400"
      >
        <tr>
          <th scope="col" class="px-6 py-3">Name</th>
          <th scope="col" class="px-6 py-3">Email</th>
          <th scope="col" class="px-6 py-3">Role</th>
          <th scope="col" class="px-6 py-3 text-right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let user of users"
          class="border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800/50"
        >
          <td class="px-6 py-4 font-medium text-slate-900 dark:text-white flex items-center gap-3">
            <div
              class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold text-xs"
            >
              {{ user.name.charAt(0).toUpperCase() }}
            </div>
            {{ user.name }}
          </td>
          <td class="px-6 py-4">{{ user.email }}</td>
          <td class="px-6 py-4">
            <select
              [ngModel]="user.role"
              (ngModelChange)="changeRole(user._id, $event)"
              class="bg-slate-50 dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-white text-xs rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-1.5"
            >
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </td>
          <td class="px-6 py-4 text-right">
            <button
              (click)="deleteUser(user._id)"
              class="text-red-500 hover:text-red-700 font-medium text-xs bg-red-50 dark:bg-red-500/10 px-3 py-1.5 rounded-lg transition-colors"
            >
              Remove
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
