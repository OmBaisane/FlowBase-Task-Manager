<div class="flex items-center justify-center h-screen bg-gray-100">
  <div class="bg-white p-8 rounded shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">FlowBase Register</h2>

    <input type="text" placeholder="Name" [(ngModel)]="name" class="w-full p-2 border mb-4" />

    <input type="email" placeholder="Email" [(ngModel)]="email" class="w-full p-2 border mb-4" />

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
      class="w-full p-2 border mb-4"
    />

    <button (click)="register()" class="w-full bg-green-500 text-white p-2 rounded">
      Register
    </button>
  </div>
</div>
