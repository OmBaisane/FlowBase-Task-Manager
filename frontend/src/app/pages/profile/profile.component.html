<div class="min-h-screen flex flex-col bg-slate-50 dark:bg-[#080d18]">
  <app-header (toggleSidebar)="isMobileMenuOpen = !isMobileMenuOpen"></app-header>

  <div class="flex flex-1 overflow-hidden relative">
    <app-sidebar
      [isOpen]="isMobileMenuOpen"
      (closeSidebar)="isMobileMenuOpen = false"
    ></app-sidebar>

    <div
      *ngIf="isMobileMenuOpen"
      (click)="isMobileMenuOpen = false"
      class="fixed inset-0 bg-black/50 z-30 lg:hidden backdrop-blur-sm transition-opacity"
    ></div>

    <main class="flex-1 overflow-y-auto w-full">
      <div class="max-w-3xl mx-auto px-6 py-8">
        <div class="flex items-start justify-between mb-8">
          <div>
            <h1 class="text-2xl font-extrabold text-slate-800 dark:text-white tracking-tight">
              My Profile
            </h1>
            <p class="text-sm text-slate-400 dark:text-slate-500 mt-1">
              Manage your personal information
            </p>
          </div>
        </div>

        <div
          *ngIf="message"
          class="mb-6 p-4 rounded-xl text-sm font-bold bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-100 dark:border-emerald-500/20"
        >
          {{ message }}
        </div>

        <div
          class="bg-white dark:bg-slate-800/70 rounded-2xl border border-slate-200/60 dark:border-slate-700/40 shadow-sm p-8"
        >
          <div class="flex flex-col sm:flex-row items-center sm:items-start gap-8">
            <div
              class="w-24 h-24 rounded-full bg-linear-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-3xl font-bold shadow-lg shrink-0"
            >
              {{ user?.name?.charAt(0)?.toUpperCase() }}
            </div>

            <div class="flex-1 w-full space-y-4">
              <div *ngIf="!editMode" class="space-y-4">
                <div>
                  <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">
                    Full Name
                  </p>
                  <p class="text-lg font-semibold text-slate-800 dark:text-white">
                    {{ user?.name }}
                  </p>
                </div>
                <div>
                  <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">
                    Email Address
                  </p>
                  <p class="text-lg font-semibold text-slate-800 dark:text-white">
                    {{ user?.email }}
                  </p>
                </div>
                <div>
                  <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">
                    Account Role
                  </p>
                  <span
                    class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold capitalize bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300"
                  >
                    {{ user?.role }}
                  </span>
                </div>

                <button
                  (click)="toggleEdit()"
                  class="mt-4 px-5 py-2.5 rounded-xl text-sm font-bold bg-blue-50 text-blue-600 hover:bg-blue-100 dark:bg-blue-500/10 dark:text-blue-400 dark:hover:bg-blue-500/20 transition-all"
                >
                  Edit Profile
                </button>
              </div>

              <div *ngIf="editMode" class="space-y-4">
                <div>
                  <label
                    class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5"
                    >Full Name</label
                  >
                  <input
                    type="text"
                    [(ngModel)]="editData.name"
                    class="w-full px-4 py-2.5 text-sm rounded-xl bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600/40 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/30"
                  />
                </div>
                <div>
                  <label
                    class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5"
                    >Email Address</label
                  >
                  <input
                    type="email"
                    [(ngModel)]="editData.email"
                    class="w-full px-4 py-2.5 text-sm rounded-xl bg-slate-50 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600/40 text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/30"
                  />
                </div>

                <div class="flex items-center gap-3 pt-2">
                  <button
                    (click)="saveProfile()"
                    class="px-5 py-2.5 rounded-xl text-sm font-bold bg-blue-600 hover:bg-blue-500 text-white shadow-md shadow-blue-500/25 transition-all"
                  >
                    Save Changes
                  </button>
                  <button
                    (click)="toggleEdit()"
                    class="px-5 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
