<div
  class="min-h-screen bg-linear-to-br from-slate-950 via-[#0f1729] to-slate-950 flex items-center justify-center p-4"
>
  <!-- Background grid decoration -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none opacity-30">
    <div
      class="absolute -top-1/2 -right-1/4 w-200 h-200 rounded-full bg-blue-600/20 blur-[120px]"
    ></div>
    <div
      class="absolute -bottom-1/4 -left-1/4 w-150 h-150 rounded-full bg-indigo-600/15 blur-[100px]"
    ></div>
  </div>

  <div class="relative w-full max-w-sm">
    <!-- Logo + Brand -->
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-linear-to-br from-blue-600 to-indigo-600 shadow-xl shadow-blue-500/30 mb-4"
      >
        <svg class="w-7 h-7 text-white" viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"
            clip-rule="evenodd"
          />
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold text-white tracking-tight">
        Flow<span class="text-blue-400">Base</span>
      </h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to your workspace</p>
    </div>

    <!-- Card -->
    <div
      class="bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-7 shadow-2xl shadow-black/40"
    >
      <div
        *ngIf="error"
        class="mb-5 flex items-center gap-2 p-3 rounded-xl text-xs font-medium bg-red-500/10 border border-red-500/20 text-red-400"
      >
        <svg
          class="w-3.5 h-3.5 flex shrink-0"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        {{ error }}
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5"
            >Email</label
          >
          <input
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="you@example.com"
            class="w-full px-4 py-3 text-sm rounded-xl transition-all bg-slate-800/60 border border-slate-700/60 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500/40"
          />
        </div>

        <div>
          <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1.5"
            >Password</label
          >
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            (keyup.enter)="login()"
            class="w-full px-4 py-3 text-sm rounded-xl transition-all bg-slate-800/60 border border-slate-700/60 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500/40"
          />
        </div>

        <button
          (click)="login()"
          [disabled]="loading"
          class="w-full py-3 text-sm font-bold rounded-xl transition-all duration-150 bg-blue-600 hover:bg-blue-500 active:scale-[0.98] text-white shadow-lg shadow-blue-500/25 hover:shadow-blue-500/35 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 mt-1"
        >
          <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            />
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
            />
          </svg>
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </div>

      <p class="text-center text-slate-500 text-xs mt-5">
        No account?
        <a
          routerLink="/register"
          class="text-blue-400 hover:text-blue-300 font-semibold transition-colors"
        >
          Create one free
        </a>
      </p>
    </div>
  </div>
</div>
